services:
  app:
    build: .
    container_name: nasa-app-hive
    depends_on:
      postgres:
        condition: service_healthy
      hive-server:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./hive_data:/tmp/nasa_logs_hive
    stdin_open: true
    tty: true

  postgres:
    image: postgres:15
    container_name: nasa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/nasa_analytics.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  hive-server:
    image: apache/hive:3.1.3
    container_name: nasa-hive
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
    ports:
      - "10000:10000"
    volumes:
      - ./hive_data:/tmp/nasa_logs_hive
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata: